<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mikey Musso</title>

    <link rel="stylesheet" href="assets/main.css" />
    <script defer src="assets/scripts/text-partials.js"></script>
    <script defer src="assets/scripts/buttons-widget.js"></script>
    <script defer src="assets/scripts/time-widget.js"></script>
    <script defer src="assets/scripts/currently-widget.js"></script>
    <script defer src="assets/scripts/poll-widget.js"></script>
    <script defer src="assets/scripts/feed-widget.js"></script>
    <script defer src="assets/scripts/music-player-widget.js"></script>
    <script defer src="assets/scripts/visualizer-widget.js"></script>
  </head>

  <body>
    <div class="layout">
      <div class="content-grid">
        <aside class="sidebar sidebar-left">
          <div id="sidebar-menu-container"></div>

          <!-- Widget music player -->
          <fieldset
            class="widget window music-player"
            id="music-player"
            aria-label="music player"
          >
            <legend class="widget__title">
              <img
                class="widget__icon is-floaty"
                src="assets/icons/music.png"
                alt=""
              />
              now playing!
            </legend>

            <div class="widget__body music-player__body">
              <div class="music-player__row">
                <img
                  class="music-player__cover"
                  src="assets/img/cover-placeholder.png"
                  alt="album cover"
                  width="56"
                  height="56"
                />

                <div class="music-player__meta">
                  <div class="music-player__title" data-mp-title>—</div>
                  <div class="music-player__artist" data-mp-artist>—</div>

                  <div
                    class="music-player__controls"
                    role="group"
                    aria-label="player controls"
                  >
                    <button
                      class="mp-btn"
                      type="button"
                      data-mp-prev
                      aria-label="previous"
                    >
                      ⏮
                    </button>
                    <button
                      class="mp-btn mp-btn--primary"
                      type="button"
                      data-mp-play
                      aria-label="play/pause"
                    >
                      ▶
                    </button>
                    <button
                      class="mp-btn"
                      type="button"
                      data-mp-next
                      aria-label="next"
                    >
                      ⏭
                    </button>
                  </div>
                </div>
              </div>

              <div class="music-player__progress">
                <span class="music-player__time" data-mp-cur>0:00</span>
                <input
                  class="mp-range"
                  data-mp-seek
                  type="range"
                  min="0"
                  max="100"
                  value="0"
                  step="0.1"
                  aria-label="seek"
                />
                <span class="music-player__time" data-mp-dur>0:00</span>
              </div>

              <div class="music-player__volume">
                <button
                  class="music-player__volume-btn"
                  data-mp-mute-btn
                  type="button"
                  aria-label="toggle mute"
                >
                  <img
                    class="music-player__volume-img"
                    data-mp-volume-icon
                    src="assets/icons/volume.png"
                    alt=""
                  />
                </button>
                <input
                  class="mp-range mp-range--volume"
                  data-mp-volume
                  type="range"
                  min="0"
                  max="100"
                  value="20"
                  step="1"
                  aria-label="volume"
                />
              </div>

              <!-- IMPORTANT: no autoplay -->
              <audio data-mp-audio preload="metadata"></audio>
            </div>
          </fieldset>

          <!-- Widget visualizer -->
          <fieldset
            class="widget window music-visualizer"
            id="music-visualizer"
            aria-label="music visualizer"
            style="display: none"
          >
            <legend class="widget__title">
              <img
                class="widget__icon is-floaty"
                src="assets/icons/music.png"
                alt=""
              />
              visualizer
            </legend>

            <div class="widget__body visualizer__body">
              <canvas
                class="visualizer__canvas"
                data-visualizer-canvas
                width="200"
                height="100"
              ></canvas>
            </div>
          </fieldset>

          <!-- Widget web revival buttons (loaded from partial) -->
          <div id="web-revival-container"></div>

          <div id="changelog-container"></div>

          <div id="ralsei-container"></div>
        </aside>

        <main class="main">
          <div class="main-inner">
            <section class="panel window">
              <div id="welcome-container"></div>
            </section>

            <section class="panel window">
              <div id="about-container"></div>
            </section>

            <div id="feed-container"></div>
            <div id="guestbook-container"></div>
          </div>
        </main>

        <aside class="sidebar sidebar-right">
          <!-- Widget de visitantes -->
          <fieldset class="widget window">
            <legend class="widget__title">
              <img
                src="assets/icons/visitors.png"
                class="widget__icon is-floaty"
                alt=""
              />
              visitors
            </legend>

            <div class="widget__body widget__counter">
              <!-- Websiteout counter -->
              <div class="counter-block">
                <script
                  type="text/javascript"
                  src="https://counter.websiteout.com/js/7/0/0/0"
                ></script>
              </div>

              <!-- SnazzySpace counter -->
              <div class="widget__body widget__counter">
                <img
                  src="http://www.snazzyspace.com/generators/viewer-counter/counter.php/fid=1771128549/style=4/counter.png"
                  alt="visitor counter"
                  class="counter-img"
                />
              </div>
            </div>
          </fieldset>

          <!-- Widget de hora local -->
          <fieldset class="widget window" aria-label="Local time widget">
            <legend class="widget__title">
              <img
                class="widget__icon is-floaty"
                src="assets/icons/clock.png"
                alt=""
              />
              my local time
            </legend>

            <div class="widget__body time-widget">
              <div class="time-widget__row">
                <span class="time-widget__clock" id="localClock">--:--:--</span>
              </div>
              <div class="time-widget__date" id="localDate">---</div>
            </div>
          </fieldset>

          <!-- Widget de status” -->
          <fieldset class="widget window" aria-label="Status widget">
            <legend class="widget__title">
              <img
                class="widget__icon is-floaty"
                src="assets/icons/status.png"
                alt=""
                aria-hidden="true"
              />
              status
            </legend>

            <div class="widget__body">
              <p>coding + café</p>
            </div>
          </fieldset>

          <!-- Widget de currently” -->
          <fieldset class="widget window" aria-label="currently">
            <legend class="widget__title">
              <img
                class="widget__icon is-floaty"
                src="assets/icons/currently.png"
                alt=""
              />
              currently
            </legend>

            <div class="widget__body currently">
              <div class="currently__row">
                <img
                  class="currently__icon"
                  src="assets/icons/hearing.png"
                  alt=""
                />
                <span class="currently__label">song:</span>
                <span class="currently__value" id="curSong">—</span>
              </div>

              <div class="currently__row">
                <img class="currently__icon" src="assets/icons/tv.png" alt="" />
                <span class="currently__label">watching:</span>
                <span class="currently__value" id="curWatch">—</span>
              </div>

              <div class="currently__row">
                <img
                  class="currently__icon"
                  src="assets/icons/book.png"
                  alt=""
                />
                <span class="currently__label">reading:</span>
                <span class="currently__value" id="curRead">—</span>
              </div>

              <div class="currently__row">
                <img
                  class="currently__icon"
                  src="assets/icons/game.png"
                  alt=""
                />
                <span class="currently__label">playing:</span>
                <span class="currently__value" id="curPlay">—</span>
              </div>
            </div>
          </fieldset>

          <!-- Widget de Polls” -->
          <fieldset class="widget window" aria-label="poll widget">
            <legend class="widget__title">
              <img
                class="widget__icon is-floaty"
                src="assets/icons/poll.png"
                alt=""
              />
              poll
            </legend>

            <div class="widget__body" id="poll-slot"></div>
          </fieldset>

          <!-- Widget de links” -->
          <fieldset class="widget window" aria-label="Links widget">
            <legend class="widget__title">
              <img
                class="widget__icon is-floaty"
                src="assets/icons/links.png"
                alt=""
                aria-hidden="true"
              />
              links
            </legend>

            <div class="widget__body">
              <ul class="mini-list">
                <li><a href="#">guestbook</a></li>
                <li><a href="#">neocities</a></li>
                <li><a href="#">rss</a></li>
              </ul>
            </div>
          </fieldset>
        </aside>
      </div>
    </div>

    <footer class="site-footer">
      <div class="site-footer__pill">
        <span class="sym">©</span> Mikey Musso
      </div>
    </footer>
  </body>
</html>
